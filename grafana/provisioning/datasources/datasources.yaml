apiVersion: 1

datasources:
  # configruation setup viewable here: https://github.com/grafana/mqtt-datasource/blob/main/src/ConfigEditor.tsx
  - name: MQTT
    uid: grafana-mqtt-datasource
    type: grafana-mqtt-datasource
    editable: true
    isDefault: true
    secureJsonData:
      password: ${MQTT_PASSWORD}
    jsonData:
      username: ${MQTT_USERNAME}
      uri: ${MQTT_HOST}

  - name: grafana-postgresql-datasource
    uid: grafana-postgresql-datasource
    type: postgres
    url: ${POSTGRES_HOST}
    database: postgres
    user: ${POSTGRES_USERNAME}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: "${POSTGRES_SSLMODE}"
      postgresVersion: 1500
      timescaledb: false
      minInterval: 1m
      maxOpenConns: 10
      maxIdleConns: 10
      maxLifetime: 14400
    editable: true
  # - name: Postgres
  #   type: postgres
  #   url: postgres:5432
